<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>認知負荷アンケート</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
    body { max-width: 780px; margin: 24px auto 40px; padding: 0 16px; line-height: 1.65; font-size: 16px; color: #1f2937; }
    h1 { margin-bottom: .4em; }
    h2 { margin: .2em 0 .7em; font-size: 1.15rem; }
    .card { border: 1px solid #d1d5db; border-radius: 10px; padding: 18px 20px; margin: 12px 0 20px; background: #fafafa; }
    label { font-weight: 650; display: block; margin-bottom: 5px; }
    input[type="text"], select { width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 12px; font: inherit; border: 1px solid #9ca3af; border-radius: 5px; background: white; }
    input[type="range"] { width: 100%; margin: 0; }
    button { padding: 9px 18px; font: inherit; cursor: pointer; border-radius: 6px; border: 1px solid #6b7280; background: #f5f5f5; }
    button.primary { background: #2563eb; border-color: #2563eb; color: white; }
    button:disabled { opacity: .5; cursor: default; }
    .buttons { margin-top: 18px; display: flex; gap: 9px; justify-content: flex-end; flex-wrap: wrap; }
    .center-buttons { justify-content: center; gap: 20px; }
    .small { font-size: .88rem; color: #4b5563; }
    .hidden { display: none; }
    .error { color: #b91c1c; }
    .success { color: #166534; }
    .section-title { font-size: 1.35rem; font-weight: 700; margin: 8px 0; }
    .question-text { margin-bottom: 34px; }
    .slider-wrapper { position: relative; padding: 12px 4px 0; }
    .slider-ticks { display: flex; justify-content: space-between; position: relative; top: -4px; margin: 0 4px; pointer-events: none; }
    .slider-tick { width: 1px; height: 6px; background: #aaa; }
    .slider-tick.major { height: 11px; background: #374151; }
    .slider-labels { display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h1>認知負荷アンケート</h1>

  <div id="intro-screen" class="card">
    <h2>はじめに</h2>
    <p class="small">直前の動画視聴タスクについて回答してください。このページはChrome・Edge・Safariなどのブラウザで開いてください。送信にはインターネット接続が必要です。</p>
    <div id="browser-warning" class="small error hidden"></div>
    <label for="participant-id">実験参加者ID</label>
    <input type="text" id="participant-id" autocomplete="off" placeholder="例: A001">
    <div class="buttons"><button id="start-button" class="primary">次へ</button></div>
  </div>

  <div id="condition-screen" class="card hidden">
    <div id="condition-progress" class="small"></div>
    <h2>実験条件の選択</h2>
    <p class="small">直前に視聴した動画の条件を選択してください。</p>
    <p id="condition-note" class="small"></p>
    <label for="video-condition">実験条件</label>
    <select id="video-condition">
      <option value="">選択してください</option>
      <option value="short">ショート動画</option>
      <option value="med">瞑想動画</option>
      <option value="control">日常動画</option>
    </select>
    <div class="buttons"><button id="condition-start-button" class="primary">アンケートを開始</button></div>
  </div>

  <div id="question-screen" class="card hidden">
    <div id="progress-label" class="small"></div>
    <div id="section-title" class="section-title"></div>
    <div id="question-text" class="question-text"></div>
    <label for="slider-input" class="small">スライダーを動かしてお答えください</label>
    <div class="slider-wrapper">
      <input type="range" id="slider-input" min="0" max="100" step="1" value="0">
      <div id="slider-ticks" class="slider-ticks"></div>
    </div>
    <div class="slider-labels small"><span id="slider-min-label"></span><span id="slider-max-label"></span></div>
    <div class="buttons">
      <button id="back-button">戻る</button>
      <button id="next-button" class="primary" disabled>次へ</button>
    </div>
  </div>

  <div id="finish-screen" class="card hidden">
    <h2 id="finish-title">回答の確認</h2>
    <p id="finish-message">この条件の全7項目に回答しました。「送信」を押してください。</p>
    <div id="submit-status" class="small" aria-live="polite"></div>
    <div class="buttons center-buttons">
      <button id="finish-back-button">戻る</button>
      <button id="submit-button" class="primary">送信</button>
      <button id="continue-button" class="primary hidden">次の条件へ</button>
    </div>
  </div>

  <script>
    "use strict";

    const SUPABASE_URL = "https://izilkytvtjzpdsbyznsj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6aWxreXR2dGp6cGRzYnl6bnNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTY1NDksImV4cCI6MjA5MzU3MjU0OX0.LQNatdpRM5zA4q4s6WEMGxB4yfaemCJVkjgf556A_Yg";
    const SURVEY_ID = "nasa_task_90";
    const TOTAL_CONDITIONS = 3;

    const QUESTIONS = [
      { key: "mental", id: "NTX_Mental", title: "精神的要求", prompt: "Q1. 直前の動画視聴タスクを行うために、どの程度頭を使いましたか？（考える、決める、記憶する、見るなど）", minLabel: "小さい", maxLabel: "大きい", standard: true },
      { key: "physical", id: "NTX_Physical", title: "身体的要求", prompt: "Q2. 直前の動画視聴タスクは、どの程度身体的に疲れましたか？", minLabel: "小さい", maxLabel: "大きい", standard: true },
      { key: "temporal", id: "NTX_Temporal", title: "時間的要求", prompt: "Q3. 直前の動画視聴タスク中に、時間に追われている感覚はどの程度ありましたか？", minLabel: "弱い", maxLabel: "強い", standard: true },
      { key: "performance", id: "NTX_Performance", title: "パフォーマンス", prompt: "Q4. 直前の動画視聴タスクの出来について、どの程度うまくできたと思いますか？（低い値ほど良い出来、高い値ほど悪い出来を表します）", minLabel: "良い", maxLabel: "悪い", standard: true },
      { key: "effort", id: "NTX_Effort", title: "努力", prompt: "Q5. 直前の動画視聴タスクを行うために、どの程度努力しましたか？", minLabel: "少ない", maxLabel: "多い", standard: true },
      { key: "frustration", id: "NTX_Frustration", title: "フラストレーション", prompt: "Q6. 直前の動画視聴タスク中に、どの程度いらいら・不安・ストレスを感じましたか？", minLabel: "低い", maxLabel: "高い", standard: true },
      { key: "overall", id: "NTX_Overall", title: "全体的負荷", prompt: "Q7. 直前の動画視聴タスク全体として、どのくらいの負荷を感じましたか？", minLabel: "低い", maxLabel: "高い", standard: false }
    ];

    const introScreen = document.getElementById("intro-screen");
    const conditionScreen = document.getElementById("condition-screen");
    const questionScreen = document.getElementById("question-screen");
    const finishScreen = document.getElementById("finish-screen");
    const participantIdInput = document.getElementById("participant-id");
    const videoConditionInput = document.getElementById("video-condition");
    const conditionProgress = document.getElementById("condition-progress");
    const conditionNote = document.getElementById("condition-note");
    const startButton = document.getElementById("start-button");
    const conditionStartButton = document.getElementById("condition-start-button");
    const backButton = document.getElementById("back-button");
    const nextButton = document.getElementById("next-button");
    const submitButton = document.getElementById("submit-button");
    const continueButton = document.getElementById("continue-button");
    const finishBackButton = document.getElementById("finish-back-button");
    const progressLabel = document.getElementById("progress-label");
    const sectionTitle = document.getElementById("section-title");
    const questionText = document.getElementById("question-text");
    const sliderInput = document.getElementById("slider-input");
    const sliderTicks = document.getElementById("slider-ticks");
    const sliderMinLabel = document.getElementById("slider-min-label");
    const sliderMaxLabel = document.getElementById("slider-max-label");
    const submitStatus = document.getElementById("submit-status");
    const finishTitle = document.getElementById("finish-title");
    const finishMessage = document.getElementById("finish-message");

    let participantId = "";
    let videoCondition = "";
    let conditionIndex = 0;
    let currentIndex = 0;
    let states = [];
    let questionVisitStartedMs = null;
    let visitFirstInputRecorded = false;
    let surveyStartedAt = null;
    let surveyStartPerfMs = null;
    let questionnaireHasStarted = false;
    let submitted = false;
    const submittedConditions = new Set();
    const browserCrypto = window.crypto;
    const pageSessionId = browserCrypto && typeof browserCrypto.randomUUID === "function"
      ? browserCrypto.randomUUID()
      : `${Date.now()}-${Math.random().toString(16).slice(2)}`;

    const browserWarning = document.getElementById("browser-warning");
    if (typeof fetch !== "function" || typeof Promise !== "function") {
      browserWarning.textContent = "このブラウザは対応していません。最新版のChrome、Edge、Safariで開いてください。";
      browserWarning.classList.remove("hidden");
      startButton.disabled = true;
    }

    for (let value = 0; value <= 100; value += 5) {
      const tick = document.createElement("div");
      tick.className = "slider-tick";
      if (value === 0 || value === 50 || value === 100) tick.classList.add("major");
      sliderTicks.appendChild(tick);
    }

    function initialiseCondition() {
      videoCondition = "";
      videoConditionInput.value = "";
      states = QUESTIONS.map(() => ({
        value: null,
        firstShownMs: null,
        cumulativeLatencyMs: 0,
        cumulativeResponseDurationMs: 0,
        visits: 0,
        revisionCount: 0
      }));
      currentIndex = 0;
      questionVisitStartedMs = null;
      surveyStartedAt = null;
      surveyStartPerfMs = null;
      questionnaireHasStarted = false;
      submitted = false;
      submitStatus.textContent = "";
      submitStatus.className = "small";
      submitButton.disabled = false;
      finishBackButton.disabled = false;
      continueButton.classList.add("hidden");
      finishTitle.textContent = "回答の確認";
      finishMessage.textContent = "この条件の全7項目に回答しました。「送信」を押してください。";
    }

    function showOnly(screen) {
      [introScreen, conditionScreen, questionScreen, finishScreen].forEach(item => item.classList.add("hidden"));
      screen.classList.remove("hidden");
    }

    function showConditionSelection() {
      conditionProgress.textContent = `条件 ${conditionIndex + 1} / ${TOTAL_CONDITIONS}`;
      for (const option of videoConditionInput.options) {
        if (option.value) option.disabled = submittedConditions.has(option.value);
      }
      const remaining = [...videoConditionInput.options]
        .filter(option => option.value && !option.disabled)
        .map(option => option.textContent);
      conditionNote.textContent = `未回答の条件: ${remaining.join("、")}`;
      showOnly(conditionScreen);
      videoConditionInput.focus();
    }

    function showQuestion(index) {
      const question = QUESTIONS[index];
      const state = states[index];
      const now = performance.now();
      progressLabel.textContent = `条件 ${conditionIndex + 1} / ${TOTAL_CONDITIONS} ・ 質問 ${index + 1} / ${QUESTIONS.length}`;
      sectionTitle.textContent = question.title;
      questionText.textContent = question.prompt;
      sliderMinLabel.textContent = question.minLabel;
      sliderMaxLabel.textContent = question.maxLabel;
      sliderInput.value = state.value === null ? 0 : state.value;
      nextButton.disabled = state.value === null;
      if (state.firstShownMs === null) state.firstShownMs = now - surveyStartPerfMs;
      questionVisitStartedMs = now;
      visitFirstInputRecorded = false;
    }

    function saveCurrentVisit() {
      if (questionVisitStartedMs === null || !states[currentIndex]) return;
      const state = states[currentIndex];
      const value = Number(sliderInput.value);
      if (state.value !== null && state.value !== value) state.revisionCount += 1;
      state.value = value;
      state.cumulativeResponseDurationMs += performance.now() - questionVisitStartedMs;
      state.visits += 1;
      questionVisitStartedMs = null;
    }

    function handleStart() {
      const value = participantIdInput.value.trim();
      if (!value) {
        alert("実験参加者IDを入力してください。");
        participantIdInput.focus();
        return;
      }
      participantId = value;
      conditionIndex = 0;
      submittedConditions.clear();
      initialiseCondition();
      showConditionSelection();
    }

    function handleConditionStart() {
      if (!videoConditionInput.value) {
        alert("実験条件を選択してください。");
        videoConditionInput.focus();
        return;
      }
      videoCondition = videoConditionInput.value;
      if (!questionnaireHasStarted) {
        surveyStartedAt = new Date();
        surveyStartPerfMs = performance.now();
        questionnaireHasStarted = true;
      }
      showOnly(questionScreen);
      showQuestion(currentIndex);
    }

    function handleNext() {
      if (nextButton.disabled) return;
      saveCurrentVisit();
      if (currentIndex < QUESTIONS.length - 1) {
        currentIndex += 1;
        showQuestion(currentIndex);
      } else {
        showOnly(finishScreen);
      }
    }

    function handleBack() {
      saveCurrentVisit();
      if (currentIndex === 0) {
        videoConditionInput.value = videoCondition;
        showConditionSelection();
        return;
      }
      currentIndex -= 1;
      showQuestion(currentIndex);
    }

    function handleFinishBack() {
      if (submitted) return;
      currentIndex = QUESTIONS.length - 1;
      showOnly(questionScreen);
      showQuestion(currentIndex);
    }

    function buildPayload() {
      const responses = QUESTIONS.map((question, index) => {
        const state = states[index];
        return {
          question_id: question.id,
          dimension_key: question.key,
          dimension_label: question.title,
          display_order: index + 1,
          question_text: question.prompt,
          slider_value: state.value,
          first_shown_sec: Number((state.firstShownMs / 1000).toFixed(3)),
          latency_to_first_input_sec: state.cumulativeLatencyMs === 0
            ? null
            : Number((state.cumulativeLatencyMs / 1000).toFixed(3)),
          cumulative_duration_sec: Number((state.cumulativeResponseDurationMs / 1000).toFixed(3)),
          visits: state.visits,
          revision_count: state.revisionCount
        };
      });
      const standardValues = QUESTIONS
        .map((question, index) => question.standard ? states[index].value : null)
        .filter(value => value !== null);
      const rawTlxSum = standardValues.reduce((sum, value) => sum + value, 0);
      return {
        survey_id: SURVEY_ID,
        participant_id: participantId,
        video_condition: videoCondition,
        condition_order: conditionIndex + 1,
        total_conditions: TOTAL_CONDITIONS,
        page_session_id: pageSessionId,
        started_at: surveyStartedAt.toISOString(),
        completed_at: new Date().toISOString(),
        total_duration_sec: Number(((performance.now() - surveyStartPerfMs) / 1000).toFixed(3)),
        raw_tlx_sum: rawTlxSum,
        raw_tlx_mean: Number((rawTlxSum / standardValues.length).toFixed(3)),
        overall_workload: states.find((_, index) => QUESTIONS[index].key === "overall").value,
        user_agent: navigator.userAgent,
        responses
      };
    }

    async function sendToSupabase(payload) {
      if (navigator.onLine === false) throw new Error("インターネットに接続されていません。");
      const response = await fetch(`${SUPABASE_URL.replace(/\/$/, "")}/rest/v1/rpc/submit_nasa_90_survey`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ payload })
      });
      if (!response.ok) throw new Error(`Supabaseへの保存に失敗しました (${response.status}): ${await response.text()}`);
      return response.json();
    }

    async function handleSubmit() {
      if (submitted || states.some(state => state.value === null)) return;
      submitButton.disabled = true;
      finishBackButton.disabled = true;
      submitStatus.className = "small";
      submitStatus.textContent = "送信中です。この画面を閉じずにお待ちください。";
      try {
        await sendToSupabase(buildPayload());
        submitted = true;
        submittedConditions.add(videoCondition);
        submitStatus.className = "small success";
        if (conditionIndex < TOTAL_CONDITIONS - 1) {
          submitStatus.textContent = `条件${conditionIndex + 1}を送信しました。「次の条件へ」を押してください。`;
          continueButton.classList.remove("hidden");
        } else {
          finishTitle.textContent = "全条件完了";
          finishMessage.textContent = "3条件全ての回答を送信しました。";
          submitStatus.textContent = "ご協力ありがとうございました。";
        }
      } catch (error) {
        console.error(error);
        submitStatus.className = "small error";
        submitStatus.textContent = `送信できませんでした。接続を確認して、もう一度「送信」を押してください。${error.message}`;
        submitButton.disabled = false;
        finishBackButton.disabled = false;
      }
    }

    function handleContinue() {
      if (!submitted || conditionIndex >= TOTAL_CONDITIONS - 1) return;
      conditionIndex += 1;
      initialiseCondition();
      showConditionSelection();
    }

    sliderInput.addEventListener("input", () => {
      const state = states[currentIndex];
      if (state && !visitFirstInputRecorded && questionVisitStartedMs !== null) {
        state.cumulativeLatencyMs += performance.now() - questionVisitStartedMs;
        visitFirstInputRecorded = true;
      }
      nextButton.disabled = false;
    });
    participantIdInput.addEventListener("keydown", event => { if (event.key === "Enter") handleStart(); });
    startButton.addEventListener("click", handleStart);
    conditionStartButton.addEventListener("click", handleConditionStart);
    nextButton.addEventListener("click", handleNext);
    backButton.addEventListener("click", handleBack);
    finishBackButton.addEventListener("click", handleFinishBack);
    submitButton.addEventListener("click", handleSubmit);
    continueButton.addEventListener("click", handleContinue);
  </script>
</body>
</html>
